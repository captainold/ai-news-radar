name: Update AI News

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode private OPML (if set)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 -d > feeds/follow.opml
            echo "Private OPML loaded"
          else
            echo "Using default OPML from repo"
          fi

      - name: Fetch AI news
        run: python scripts/update_news.py --output-dir data --window-hours 24
        env:
          HTTP_PROXY: ${{ vars.HTTP_PROXY }}
          HTTPS_PROXY: ${{ vars.HTTPS_PROXY }}

      - name: Commit and push updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # Skip archive.json (too large for GitHub)
          git add data/latest-24h.json data/latest-24h-all.json data/source-status.json data/title-zh-cache.json data/waytoagi-7d.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: update news data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
